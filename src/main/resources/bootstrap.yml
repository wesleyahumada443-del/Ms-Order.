spring:
  cloud:
    config:
      fail-fast: ${CONFIG_FAIL_FAST:true}
      #uri: ${URI_CONFIG:http://10.7.5.6:8989}
      uri: ${URI_CONFIG:http://localhost:8989}
      retry:
        initial-interval: ${CONFIG_FAIL_FAST:1000}
        maxInterval: ${CONFIG_MAX_INTERVAL:10000}
        max-attempts: ${CONFIG_MAX_ATTEMPTS:30}
        multiplier: ${CONFIG_MULTIPLIER:2}
